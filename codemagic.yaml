# =============================================================================
# codemagic.yaml - The Dread Directory
# Signed TestFlight workflow + unsigned smoke test.
# Injects iOS Info.plist permission strings (location + camera) automatically
# after Capacitor scaffolds the iOS project, before the build runs.
# =============================================================================
workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build (Pre-signing Smoke Test)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      xcode: 26.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web app (Vite)
        script: |
          npm run build
      - name: Add iOS platform (Capacitor)
        script: |
          npx cap add ios
      - name: Inject Info.plist permission strings
        script: |
          PLIST="ios/App/App/Info.plist"
          plutil -insert NSLocationWhenInUseUsageDescription -string "The Dread Directory uses your location to show you nearby haunted, historical, and macabre sites." "$PLIST" || \
            plutil -replace NSLocationWhenInUseUsageDescription -string "The Dread Directory uses your location to show you nearby haunted, historical, and macabre sites." "$PLIST"
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "The Dread Directory needs background location access to notify you when you're near a sinister site, even when the app is closed." "$PLIST" || \
            plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "The Dread Directory needs background location access to notify you when you're near a sinister site, even when the app is closed." "$PLIST"
          plutil -insert NSLocationAlwaysUsageDescription -string "The Dread Directory needs background location to ping you when you're near a sinister site." "$PLIST" || \
            plutil -replace NSLocationAlwaysUsageDescription -string "The Dread Directory needs background location to ping you when you're near a sinister site." "$PLIST"
          plutil -insert NSCameraUsageDescription -string "The Dread Directory uses your camera so you can take a verification photo when submitting a new sinister site." "$PLIST" || \
            plutil -replace NSCameraUsageDescription -string "The Dread Directory uses your camera so you can take a verification photo when submitting a new sinister site." "$PLIST"
          plutil -insert UIBackgroundModes -array "$PLIST" 2>/dev/null || true
          plutil -insert UIBackgroundModes.0 -string location "$PLIST" 2>/dev/null || true
          plutil -insert UIBackgroundModes.1 -string fetch "$PLIST" 2>/dev/null || true
          echo "--- Final Info.plist ---"
          plutil -p "$PLIST"
      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build unsigned .app for simulator (smoke test)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/Build/Products/**/*.app
      - ios/App/build/**/*.dSYM.zip
    publishing:
      email:
        recipients:
          - drewkrotz@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: iOS TestFlight Build (Signed)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic TestFlight
    environment:
      groups:
        - code-signing
      node: 22
      xcode: 26.2
      cocoapods: default
      vars:
        APP_STORE_APP_ID: "6765894869"
        BUNDLE_ID: "com.sinistertrivia.macabretest"
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web app (Vite)
        script: |
          npm run build
      - name: Add iOS platform (Capacitor)
        script: |
          npx cap add ios
      - name: Inject Info.plist permission strings
        script: |
          PLIST="ios/App/App/Info.plist"
          plutil -insert NSLocationWhenInUseUsageDescription -string "The Dread Directory uses your location to show you nearby haunted, historical, and macabre sites." "$PLIST" || \
            plutil -replace NSLocationWhenInUseUsageDescription -string "The Dread Directory uses your location to show you nearby haunted, historical, and macabre sites." "$PLIST"
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "The Dread Directory needs background location access to notify you when you're near a sinister site, even when the app is closed." "$PLIST" || \
            plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "The Dread Directory needs background location access to notify you when you're near a sinister site, even when the app is closed." "$PLIST"
          plutil -insert NSLocationAlwaysUsageDescription -string "The Dread Directory needs background location to ping you when you're near a sinister site." "$PLIST" || \
            plutil -replace NSLocationAlwaysUsageDescription -string "The Dread Directory needs background location to ping you when you're near a sinister site." "$PLIST"
          plutil -insert NSCameraUsageDescription -string "The Dread Directory uses your camera so you can take a verification photo when submitting a new sinister site." "$PLIST" || \
            plutil -replace NSCameraUsageDescription -string "The Dread Directory uses your camera so you can take a verification photo when submitting a new sinister site." "$PLIST"
          plutil -insert UIBackgroundModes -array "$PLIST" 2>/dev/null || true
          plutil -insert UIBackgroundModes.0 -string location "$PLIST" 2>/dev/null || true
          plutil -insert UIBackgroundModes.1 -string fetch "$PLIST" 2>/dev/null || true
          echo "--- Final Info.plist ---"
          plutil -p "$PLIST"
      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "1")
          agvtool new-marketing-version 1.7 && agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build signed .ipa for App Store
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/**/*.dSYM.zip
    publishing:
      email:
        recipients:
          - drewkrotz@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
