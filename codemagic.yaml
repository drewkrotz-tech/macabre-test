# =============================================================================
# codemagic.yaml - The Dread Directory
# Signed TestFlight workflow + unsigned smoke test.
# =============================================================================
workflows:
  ios-unsigned-build:
      name: iOS Unsigned Build (Pre-signing Smoke Test)
          instance_type: mac_mini_m2
              max_build_duration: 60
                  environment:
                        node: 22
                              xcode: 26.2
                                    cocoapods: default
                                        scripts:
                                              - name: Install npm dependencies
                                                      script: |
                                                                npm ci
                                                                      - name: Build web app (Vite)
                                                                              script: |
                                                                                        npm run build
                                                                                              - name: Add iOS platform (Capacitor)
                                                                                                      script: |
                                                                                                                npx cap add ios
                                                                                                                      - name: Generate iOS app icons from master
                                                                                                                              script: |
                                                                                                                                        npx @capacitor/assets generate --ios
                                                                                                                                              - name: Sync Capacitor to iOS
                                                                                                                                                      script: |
                                                                                                                                                                npx cap sync ios
                                                                                                                                                                      - name: Install CocoaPods dependencies
                                                                                                                                                                              script: |
                                                                                                                                                                                        cd ios/App && pod install
                                                                                                                                                                                              - name: Build unsigned .app for simulator (smoke test)
                                                                                                                                                                                                      script: |
                                                                                                                                                                                                                cd ios/App
                                                                                                                                                                                                                          xcodebuild \
                                                                                                                                                                                                                                      -workspace App.xcworkspace \
                                                                                                                                                                                                                                                  -scheme App \
                                                                                                                                                                                                                                                              -configuration Debug \
                                                                                                                                                                                                                                                                          -sdk iphonesimulator \
                                                                                                                                                                                                                                                                                      -derivedDataPath build \
                                                                                                                                                                                                                                                                                                  CODE_SIGNING_REQUIRED=NO \
                                                                                                                                                                                                                                                                                                              CODE_SIGNING_ALLOWED=NO
                                                                                                                                                                                                                                                                                                                  artifacts:
                                                                                                                                                                                                                                                                                                                        - ios/App/build/Build/Products/**/*.app
                                                                                                                                                                                                                                                                                                                              - ios/App/build/**/*.dSYM.zip
                                                                                                                                                                                                                                                                                                                                  publishing:
                                                                                                                                                                                                                                                                                                                                        email:
                                                                                                                                                                                                                                                                                                                                                recipients:
                                                                                                                                                                                                                                                                                                                                                          - drewkrotz@gmail.com
                                                                                                                                                                                                                                                                                                                                                                  notify:
                                                                                                                                                                                                                                                                                                                                                                            success: true
                                                                                                                                                                                                                                                                                                                                                                                      failure: true
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                        ios-testflight:
                                                                                                                                                                                                                                                                                                                                                                                            name: iOS TestFlight Build (Signed)
                                                                                                                                                                                                                                                                                                                                                                                                instance_type: mac_mini_m2
                                                                                                                                                                                                                                                                                                                                                                                                    max_build_duration: 90
                                                                                                                                                                                                                                                                                                                                                                                                        integrations:
                                                                                                                                                                                                                                                                                                                                                                                                              app_store_connect: Codemagic TestFlight
                                                                                                                                                                                                                                                                                                                                                                                                                  environment:
                                                                                                                                                                                                                                                                                                                                                                                                                        node: 22
                                                                                                                                                                                                                                                                                                                                                                                                                              xcode: 26.2
                                                                                                                                                                                                                                                                                                                                                                                                                                    cocoapods: default
                                                                                                                                                                                                                                                                                                                                                                                                                                          ios_signing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                  distribution_type: app_store
                                                                                                                                                                                                                                                                                                                                                                                                                                                          bundle_identifier: com.sinistertrivia.macabretest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                vars:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        APP_STORE_APP_ID: "6765894869"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            scripts:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Install npm dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    npm ci
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Build web app (Vite)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            npm run build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Add iOS platform (Capacitor)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    npx cap add ios
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Generate iOS app icons from master
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            npx @capacitor/assets generate --ios
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Sync Capacitor to iOS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    npx cap sync ios
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Install CocoaPods dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cd ios/App && pod install
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Set up signing
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    keychain initialize
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              keychain add-certificates
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        xcode-project use-profiles
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Increment build number
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cd ios/App
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "1")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    agvtool new-marketing-version 1.0 && agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Build signed .ipa for App Store
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cd ios/App
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      xcode-project build-ipa \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  --workspace App.xcworkspace \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              --scheme App \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          --config Release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              artifacts:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - ios/App/build/ios/ipa/*.ipa
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - /tmp/xcodebuild_logs/*.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - ios/App/build/**/*.dSYM.zip
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    publishing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          email:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  recipients:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - drewkrotz@gmail.com
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    notify:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              success: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        failure: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              app_store_connect:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      auth: integration
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              submit_to_testflight: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      submit_to_app_store: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
